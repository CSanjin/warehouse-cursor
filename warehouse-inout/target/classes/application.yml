server:
  port: 8085

spring:
  application:
    name: warehouse-inout
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/warehouse_inout?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: czx041226.
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
    sentinel:
      transport:
        dashboard: 127.0.0.1:8858
        port: 8724
      eager: true
    openfeign:
      sentinel:
        enabled: true
rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: warehouse-inout-producer-group

# Seata：事务组名须与 Spring Cloud Alibaba 默认规则一致，并在本地配置 vgroup-mapping（勿依赖 Nacos 中未创建的 seata-server.properties）
seata:
  enabled: true
  tx-service-group: warehouse-inout-seata-service-group
  service:
    vgroup-mapping:
      warehouse-inout-seata-service-group: default
  registry:
    type: nacos
    nacos:
      application: seata-server
      server-addr: 127.0.0.1:8848
      group: SEATA_GROUP
  config:
    type: file
  client:
    undo:
      # 避免 Jackson 序列化 undo_log 时无法处理 MySQL8 的 DATETIME/Object 类型
      log-serialization: kryo

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto

logging:
  level:
    com.warehouse: debug
